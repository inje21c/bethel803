name: Supabase Staging (auto)

# main에 supabase/ 변경이 머지되면 staging에 자동 반영한다.
# 필요한 GitHub Secrets:
#   STAGING_DB_URL                — staging Postgres 연결 문자열 (Settings→Database→URI)
#   SUPABASE_ACCESS_TOKEN_STAGING — staging 계정의 access token

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:

concurrency:
  group: supabase-staging
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Apply new migrations to staging
        env:
          DB_URL: ${{ secrets.STAGING_DB_URL }}
        run: bash scripts/apply_migrations.sh

      - name: Deploy edge functions to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_STAGING }}
        # esm.sh 간헐적 522 오류 대비 최대 3회 재시도
        run: |
          for i in 1 2 3; do
            npx --yes supabase@2 functions deploy --project-ref czcdtlkrqjtzhlplugca && break
            echo "Deploy attempt $i failed, retrying in 30s..."
            sleep 30
          done
