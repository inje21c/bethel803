name: Seed Bible Data (manual)

# 자체 성경 DB 시드(docs/bible_kr_seed.sql, 멱등)를 대상 환경에 주입한다.
# 시드 SQL은 ON CONFLICT 기반이라 여러 번 실행해도 안전하다.

on:
  workflow_dispatch:
    inputs:
      target:
        description: '대상 환경'
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging
      confirm:
        description: '확인을 위해 "seed-bible"을 입력하세요'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  seed:
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'seed-bible' }}
    steps:
      - uses: actions/checkout@v5

      - name: Generate seed SQL from bible_kr.json
        run: node scripts/generate_bible_seed_sql.mjs docs/bible_kr.json /tmp/bible_kr_seed.sql

      - name: Seed bible data
        env:
          DB_URL: ${{ inputs.target == 'prod' && secrets.PROD_DB_URL || secrets.STAGING_DB_URL }}
        run: |
          echo "Seeding bible data to ${{ inputs.target }}"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f /tmp/bible_kr_seed.sql
          psql "$DB_URL" -tAc "SELECT 'books='||count(*) FROM public.bible_books; SELECT 'verses='||count(*) FROM public.bible_verses;"
